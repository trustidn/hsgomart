services:

  postgres:
    image: postgres:16-alpine
    container_name: hsgomart-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-hsmart_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-hsmart_saas}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hsmart_user}"]
      interval: 5s
      timeout: 5s
      retries: 5


  migrate:
    image: migrate/migrate:v4.17.0
    container_name: hsgomart-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path","/migrations",
        "-database","postgres://${DB_USER:-hsmart_user}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-hsmart_saas}?sslmode=disable",
        "up"
      ]


  app:
    build: .
    image: hsgomart-app:latest
    container_name: hsgomart-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      APP_PORT: "8080"
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-hsmart_user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-hsmart_saas}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    volumes:
      - uploads:/app/uploads


volumes:
  pgdata:
  uploads: